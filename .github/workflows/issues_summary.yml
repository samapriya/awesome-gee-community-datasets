name: Generate Issues Summary & Stats

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 */2 * *"

jobs:
  issues-summary:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install requests

      - name: Generate issues summary
        env:
          GITHUB_TOKEN: ${{ secrets.ISSUES_TOKEN }}
          REPO: ${{ github.repository }}
        run: python scripts/issues_summary.py

      - name: Generate repo stats
        env:
          GITHUB_TOKEN: ${{ secrets.ISSUES_TOKEN }}
          REPO: ${{ github.repository }}
        run: python scripts/repo_stats.py

      - name: Commit updated JSON and avatars
        run: |
          git config user.name "issues-bot"
          git config user.email "issues-bot@users.noreply.github.com"

          git add issues-summary.json repo-stats.json assets/avatars/

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          # Show a compact summary of what changed
          NEW_AVATARS=$(git diff --cached --name-only | grep "^assets/avatars/" | wc -l)
          if [ "$NEW_AVATARS" -gt 0 ]; then
            git commit -m "Update issues summary, repo stats, and ${NEW_AVATARS} new avatar(s)"
          else
            git commit -m "Update issues summary and repo stats"
          fi

          git push
